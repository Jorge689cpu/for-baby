<!DOCTYPE html>
<html>
<head>
    <title>For My Love ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        p {
            font-size: 22px;
            margin: 10px 0;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            background: white;
            color: #ff4e88;
            transition: 0.3s;
        }

        button:hover {
            background: #ffe3ec;
        }

        #hiddenMessage {
            display: none;
            margin-top: 20px;
            font-size: 24px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .hearts span {
            position: absolute;
            display: block;
            font-size: 24px;
            animation: float 10s linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-10vh); }
        }
    </style>
</head>
<body>

<div class="hearts">
    <span style="left:10%; animation-delay:0s;">❤️</span>
    <span style="left:30%; animation-delay:2s;">💕</span>
    <span style="left:50%; animation-delay:4s;">💖</span>
    <span style="left:70%; animation-delay:1s;">💘</span>
    <span style="left:85%; animation-delay:3s;">💝</span>
</div>

<div class="card">
    <h1>Hey Beautiful ❤️</h1>
    <p>I made this just for you.</p>
    <p>Click the button below...</p>

    <button onclick="showMessage()">Click Me 💌</button>

    <div id="hiddenMessage">
        I just want you to know... <br><br>
        I love you more than words can explain 💖
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("hiddenMessage").style.display = "block";
}
</script>

</body>
</html>
